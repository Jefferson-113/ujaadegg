<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Galeria Responsiva</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        transition: background-color 0.3s duration;
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 10px;
        padding: 20px;
        padding-bottom: 100px;
      }

      img {
        width: 100%;
        height: auto;
        display: block;
      }

      html.dark .gallery {
        background-color: #1f2937;
      }
    </style>
  </head>
  <body class="transition-colors duration-300">
    <!-- Top Bar with Dark Mode Toggle -->
    <div
      class="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-700 px-4 py-3 sticky top-0 z-40"
    >
      <div class="flex justify-between items-center max-w-7xl mx-auto">
        <a href="index.html" class="flex items-center">
          <img src="assets/ujadeglogo2026.jpg" class="h-8" alt="Logo" />
        </a>
        <div class="flex items-center gap-2">
          <select
            id="theme-selector"
            class="p-2 rounded-lg bg-gray-100 dark:bg-gray-800 text-gray-800 dark:text-white hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors cursor-pointer font-semibold text-sm border border-gray-300 dark:border-gray-600"
          >
            <option value="light">☀️ Claro</option>
            <option value="dark">🌙 Escuro</option>
            <option value="black">⬛ Preto</option>
          </select>
        </div>
      </div>
    </div>
    <div class="gallery">
      <img src="assets/camisaki.jpg" alt="Imagem 1" />
      <img src="assets/camisaki.jpg" alt="Imagem 2" />
      <img src="assets/camisaki.jpg" alt="Imagem 3" />
      <!-- Adicione mais imagens conforme necessário -->
    </div>

    <!-- Bottom Navigation Menu -->
    <nav
      class="fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-700 transition-colors duration-300 z-50"
    >
      <div class="flex justify-around items-center max-w-7xl mx-auto">
        <a
          href="index.html"
          class="menu-link flex flex-col items-center justify-center w-20 py-3 text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors flex-1"
        >
          <svg
            class="w-6 h-6 mb-1"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M3 12l2-3m0 0l7-4 7 4M5 9v10a1 1 0 001 1h12a1 1 0 001-1V9m-9 4v4m0 0v2m0-2h4v-4m-9-3l2-3m8 8l2-3M5 9V7a2 2 0 012-2h6a2 2 0 012 2v2m0 0h8"
            />
          </svg>
          <span class="text-xs">Início</span>
        </a>
        <a
          href="ensaio.html"
          class="menu-link flex flex-col items-center justify-center w-20 py-3 text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors flex-1"
        >
          <svg
            class="w-6 h-6 mb-1"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"
            />
          </svg>
          <span class="text-xs">Ensaios</span>
        </a>
        <a
          href="programacao.html"
          class="menu-link flex flex-col items-center justify-center w-20 py-3 text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors flex-1"
        >
          <svg
            class="w-6 h-6 mb-1"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"
            />
          </svg>
          <span class="text-xs">Programação</span>
        </a>
        <a
          href="https://solistagrandecoralofi.vercel.app/"
          class="menu-link flex flex-col items-center justify-center w-20 py-3 text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors flex-1"
        >
          <svg
            class="w-6 h-6 mb-1"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
            />
          </svg>
          <span class="text-xs">Solista</span>
        </a>
      </div>
    </nav>

    <script src="script.js"></script>
  </body>
</html>
